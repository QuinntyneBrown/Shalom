<app-offline-banner />
<app-update-toast />

@if (loading()) {
  <div class="sh-app-loading" aria-hidden="true"></div>
} @else if (chrome()) {
  <div class="sh-frame">
    <router-outlet />
  </div>
  @if (authenticated()) {
    <sh-bottom-nav [active]="activeNav()" />
  }
} @else if (ritual()) {
  <div class="sh-frame sh-frame--bare">
    <router-outlet />
  </div>
} @else {
  <router-outlet />
}
